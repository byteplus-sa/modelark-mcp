name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.11.26"

jobs:
  quality:
    name: Quality, security, and package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install pinned uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Verify lockfile and install
        run: |
          uv lock --check
          uv sync --locked

      - name: Lint and format check
        run: |
          uv run ruff check src tests scripts
          uv run ruff format --check src tests scripts

      - name: Type check
        run: uv run mypy src

      - name: Offline tests with coverage
        run: uv run pytest --disable-socket --allow-unix-socket --cov=modelark_mcp --cov-report=term-missing

      - name: Static security scan
        run: uv run bandit -q -r src/modelark_mcp

      - name: Dependency vulnerability audit
        run: uv run pip-audit --strict

      - name: Secret scan
        run: uv run detect-secrets scan --baseline .secrets.baseline

      - name: Build wheel and source distribution
        run: uv build

      - name: Smoke-test installed wheel
        run: |
          uv venv /tmp/modelark-wheel-smoke
          uv pip install --python /tmp/modelark-wheel-smoke/bin/python dist/*.whl
          /tmp/modelark-wheel-smoke/bin/python -c "import modelark_mcp; assert modelark_mcp.create_server"

  container:
    name: Container build and health
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build image
        run: docker build --tag modelark-mcp:ci .

      - name: Exercise health endpoint
        run: |
          docker run --detach --rm --name modelark-mcp-ci \
            --publish 127.0.0.1:3000:3000 \
            --env MCP_JWT_JWKS_URI=https://auth.example.test/.well-known/jwks.json \
            --env MCP_JWT_ISSUER=https://auth.example.test/ \
            --env MCP_JWT_AUDIENCE=modelark-mcp \
            modelark-mcp:ci
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:3000/health; then
              exit 0
            fi
            sleep 1
          done
          docker logs modelark-mcp-ci
          exit 1

      - name: Stop container
        if: always()
        run: docker stop modelark-mcp-ci || true
